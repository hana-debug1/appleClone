<!doctype html>
<html lang="en">
  <head>

    <!-- Title -->

    <!-- Bootstrap CSS -->

  <body>
    <!-- Navigation -->
    <header></header>

    <!-- Main Content -->
    <main>
      <!-- 2. MacBook air Section -->
      <section class="hero-section macbook-hero text-center mt-2">
        <div class="container pt-3">
          <h2 class="hero-title pt-0 fw-bold">MacBook air</h2>
          <p class="hero-subtitle">Amazing Mac. Surprising price.</p>
          <div class="d-flex justify-content-center gap-3 mt-3">

            >
              Learn More
            </button>
            <button
              class="btn btn-outline-primary rounded-pill px-2 px-md-4 py-1 py-md-2"
            >
              Shop iPhone
            </button>
          </div>
        </div>
      </section>

      <!-- Hero Section 2 iphone 17 -->
      <section class="hero-section iphone-hero text-center">
        <div class="container pt-3">
          <h1 class="hero-title fw-bold">iPhone 17</h1>
          <p class="hero-subtitle">Magichromatic.</p>
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button
              class="btn btn-primary rounded-pill px-2 px-md-4 py-1 py-md-2"
            >
              Learn More
            </button>
            <button
              class="btn btn-outline-primary rounded-pill px-2 px-md-4 py-1 py-md-2"
            >
              Shop iPhone
            </button>
          </div>
        </div>
      </section>
      <!-- Hero Section 3 -->
      <section class="hero-section iphone-pro-hero text-center">
        <div class="container pt-3">
          <h1 class="hero-title fw-bold">iPhone 17-pro</h1>
          <p class="hero-subtitle">All out pro</p>
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button
              class="btn btn-primary rounded-pill px-2 px-md-4 py-1 py-md-2"
            >
              Learn More
            </button>
            <button
              class="btn btn-outline-primary rounded-pill px-2 px-md-4 py-1 py-md-2"
            >
              Shop iPhone
            </button>
          </div>
        </div>
      </section>
      <!-- Promo Section -->
      <section id="promo-section" class="promo-section">
        <!-- Promo Row 1 -->
        <section class="container-fluid py-3">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <div class="text-center py-5 bg-light text-dark iPad promoCommon">
                <img
                  src="./images/icons/promo_logo_ipad_air__dqdj4ni03quu_large.png"
                  class="d-block mx-auto pt-4 pb-2"
                  alt=""
                />
                <h4 class="pb-2">Now Supercharged by M4</h4>
                <button class="btn btn-primary rounded-pill m-2">
                  Learn More
                </button>
                <button
                  type="button"
                  class="btn btn-outline-primary rounded-pill"
                >
                  Buy
                </button>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div
                class="text-center py-5 bg-light text-dark macBook promoCommon"
              >
                <h1 class="pt-1 fw-bold text-white">MacBook Pro</h1>
                <h4 class="pb-2 text-white">Now with M5, M5 Pro and M5 Max.</h4>
                <button class="btn btn-primary rounded-pill m-2">
                  Learn More
                </button>
                <button
                  type="button"
                  class="btn btn-outline-primary rounded-pill"
                >
                  Buy
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Promo Row 2 -->
        <section id="promo-row-2" class="promo-row">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <div
                class="text-center airPod promoCommon d-flex flex-column justify-content-end align-items-center"
              >
                <h1 class="pt-1 text-white">AirPods Pro 3</h1>
                <h4 class="text-white">The world's best in-ear</h4>
                <h4 class="pb-1 text-white">Active Noise Cancelation</h4>

                <div class="mb-5">
                  <button class="btn btn-light rounded-pill px-4 me-2">
                    Learn More
                  </button>
                  <button class="btn btn-outline-light rounded-pill px-4">
                    Buy
                  </button>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div
                class="text-center py-5 bg-light text-dark watch promoCommon"
              >
                <img
                  src="./images/icons/watch_series_11.png"
                  class="d-block mx-auto pt-4 pb-2"
                  alt=""
                />
                <h4 class="pb-2">The Ultimate way to watch your health.</h4>
                <button class="btn btn-primary rounded-pill m-2">
                  Learn More
                </button>
                <button
                  type="button"
                  class="btn btn-outline-primary rounded-pill"
                >
                  Buy
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Promo Row 3 -->
        <section id="promo-row-3" class="promo-row">
          <article class="promo-card promo-card-left"></article>

          <article class="promo-card promo-card-right"></article>
        </section>
      </section>

     <!-- ==========================================================================
     Apple TV Section
     ========================================================================== -->

<div class="apple-carousel-container" id="appleSection">
  <h2 class="slider-title">Endless entertainment.</h2>
  
  <!-- ROW 1: Large Media Display Track (Primary Carousel) -->
  <div class="carousel-track large-track" id="largeTrack">
    <!-- Left Cloned Buffer Elements (Engineered for Infinite Left Scrolling) -->
    <div class="slide-card large color1"></div>
    <div class="slide-card large color2"></div>
    <div class="slide-card large color3"></div>
    <div class="slide-card large color4"></div>
    
    <!-- Core Interactive Viewport Cards (Primary Display Sequence) -->
    <div class="slide-card large color1" id="startCard"></div>
    <div class="slide-card large color2"></div>
    <div class="slide-card large color3"></div>
    <div class="slide-card large color4"></div>
    
    <!-- Right Cloned Buffer Elements (Engineered for Infinite Right Scrolling) -->
    <div class="slide-card large color1"></div>
    <div class="slide-card large color2"></div>
    <div class="slide-card large color3"></div>
    <div class="slide-card large color4"></div>
  </div>

  <!-- ROW 2: Compact Navigation Thumbnails Track (Synchronized Progress Indicator) -->
  <div class="carousel-track small-track" id="smallTrack">
    <!-- Left Boundary Buffers -->
    <div class="slide-card small c1"></div> <div class="slide-card small c2"></div>
    <div class="slide-card small c3"></div> <div class="slide-card small c4"></div>
    
    <!-- Center Core Navigation Cards -->
    <div class="slide-card small c1"></div> <div class="slide-card small c2"></div>
    <div class="slide-card small c3"></div> <div class="slide-card small c4"></div>
    
    <!-- Right Boundary Buffers -->
    <div class="slide-card small c1"></div> <div class="slide-card small c2"></div>
    <div class="slide-card small c3"></div> <div class="slide-card small c4"></div>
  </div>
</div>
    </main>
    <!-- Footer -->
    <footer></footer>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="./js/main.js"></script>
  </body>
</html>
